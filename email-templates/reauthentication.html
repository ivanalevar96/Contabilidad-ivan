<!-- Asunto sugerido: Tu código de confirmación — UltimaCuota -->
<div style="background-color:#f4f4f2;padding:32px 16px;font-family:'IBM Plex Sans',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;margin:0 auto;background-color:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;">
    <tr>
      <td style="background-color:#0b1522;padding:28px 32px;">
        <img src="https://ultimacuota.cl/brand/mark-transparent-128.png" alt="UltimaCuota" width="36" height="36" style="display:block;border-radius:9px;" />
      </td>
    </tr>
    <tr>
      <td style="padding:36px 32px 8px 32px;">
        <h1 style="margin:0 0 12px 0;font-size:20px;line-height:1.3;color:#0b1522;font-weight:600;">Confirma que eres tú</h1>
        <p style="margin:0 0 24px 0;font-size:14.5px;line-height:1.6;color:#4b5563;">
          Usa este código para confirmar una acción sensible en tu cuenta de UltimaCuota:
        </p>
        <div style="background-color:#f4f4f2;border-radius:10px;padding:16px;text-align:center;margin-bottom:24px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;letter-spacing:4px;color:#0b1522;">{{ .Token }}</span>
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding:0px 32px 32px 32px;">
        <p style="margin:0;font-size:12.5px;line-height:1.6;color:#9ca3af;">
          Este código expira pronto. Si no fuiste tú quien solicitó esto, cambia tu contraseña de inmediato.
        </p>
      </td>
    </tr>
  </table>
</div>
