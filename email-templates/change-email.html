<!-- Asunto sugerido: Confirma tu nuevo correo — UltimaCuota -->
<div style="background-color:#f4f4f2;padding:32px 16px;font-family:'IBM Plex Sans',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;margin:0 auto;background-color:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;">
    <tr>
      <td style="background-color:#0b1522;padding:28px 32px;">
        <img src="https://ultimacuota.cl/brand/mark-transparent-128.png" alt="UltimaCuota" width="36" height="36" style="display:block;border-radius:9px;" />
      </td>
    </tr>
    <tr>
      <td style="padding:36px 32px 8px 32px;">
        <h1 style="margin:0 0 12px 0;font-size:20px;line-height:1.3;color:#0b1522;font-weight:600;">Confirma tu nuevo correo</h1>
        <p style="margin:0 0 28px 0;font-size:14.5px;line-height:1.6;color:#4b5563;">
          Solicitaste cambiar el correo de tu cuenta de UltimaCuota a <strong style="color:#0b1522;">{{ .NewEmail }}</strong>. Confirma este cambio con el botón de abajo.
        </p>
        <table role="presentation" cellpadding="0" cellspacing="0">
          <tr>
            <td style="border-radius:10px;background-color:#10b981;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 26px;font-size:14.5px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:10px;">
                Confirmar nuevo correo
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="padding:28px 32px 32px 32px;">
        <p style="margin:0;font-size:12.5px;line-height:1.6;color:#9ca3af;">
          Si no solicitaste este cambio, ignora este correo y revisa la seguridad de tu cuenta.
        </p>
      </td>
    </tr>
  </table>
</div>
